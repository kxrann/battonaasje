<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niet gevonden — Battonaasje</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1a1714">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<link rel="apple-touch-icon" sizes="512x512" href="/favicon.png">
<link rel="preload" href="/fonts/co3bmX5slCNuHLi8bLeY9MK7whWMhyjYqXtKky2F7g.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1714;
    color: #f2ede4;
    font-family: 'Courier Prime', 'Courier New', monospace;
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card { max-width: 520px; width: 100%; text-align: center; }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 12px;
    margin-bottom: 8px;
    font-kerning: none;
    color: #f2ede4;
  }
  .line { width: 40px; height: 1px; background: #3a3528; margin: 0 auto 56px; }
  .num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(80px, 18vw, 140px);
    line-height: 1;
    color: #8c8478;
    margin-bottom: 32px;
    letter-spacing: 8px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(22px, 4vw, 32px);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #f2ede4;
    margin-bottom: 18px;
  }
  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.7;
    color: #c8c0b0;
    max-width: 380px;
    margin: 0 auto 48px;
  }
  .home {
    display: inline-block;
    text-decoration: none;
    padding: 16px 28px;
    background: #f2ede4;
    color: #1a1714;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .home:hover { opacity: 0.88; }
  .small { font-size: 10px; letter-spacing: 2px; color: #8c8478; margin-top: 24px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  /* ═══ ACCESSIBILITY ═══ */
  /* Skip-link — keyboard users jump past nav */
  .skip-link {
    position: absolute; top: -100px; left: 0;
    background: var(--ink); color: var(--paper);
    padding: 12px 20px;
    font-family: 'Courier Prime', monospace;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    text-decoration: none;
    z-index: 10000;
    transition: top 0.15s ease-out;
  }
  .skip-link:focus { top: 0; outline: 2px solid var(--paper); outline-offset: -2px; }

  /* Stronger, visible focus indicator across the site */
  :focus-visible {
    outline: 2px solid var(--ink) !important;
    outline-offset: 3px !important;
    border-radius: 2px;
  }
  #private-gate :focus-visible, #age-gate :focus-visible { outline-color: #f2ede4 !important; }

  /* Screen-reader-only utility class */
  .sr-only {
    position: absolute !important;
    width: 1px !important; height: 1px !important;
    padding: 0 !important; margin: -1px !important;
    overflow: hidden !important; clip: rect(0,0,0,0) !important;
    white-space: nowrap !important; border: 0 !important;
  }
</style>
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<meta http-equiv="X-DNS-Prefetch-Control" content="off">
<meta name="format-detection" content="telephone=no">
</head>
<body>
<a href="#main" class="skip-link">Naar inhoud</a>

<main class="card">
  <div class="logo">BATTONAASJE</div>
  <div class="line"></div>
  <div class="num">404</div>
  <h1>Niet gevonden</h1>
  <p class="quote">Deze pagina bestaat niet of is verplaatst.</p>
  <a href="/" class="home">Terug naar de kelder &rarr;</a>
</main>
</body>
</html>
